<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Mood Ring</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: #07070e;
  color: #c8c8e0;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Screens ──────────────────────────────────────────────────────────── */

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 36px;
  opacity: 1;
  transition: opacity 0.5s ease;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ── Welcome ──────────────────────────────────────────────────────────── */

#screen-welcome h1 {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #7878aa;
  margin-bottom: 52px;
}

.welcome-body {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  width: 100%;
  max-width: 260px;
  gap: 12px;
}

.welcome-desc {
  font-size: 14px;
  color: #9090b8;
  line-height: 1.9;
  margin-bottom: 20px;
  align-self: center;
  text-align: center;
}

.field-label {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #6060a0;
}

#age-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid #2a2a50;
  color: #b0b0d8;
  font-size: 36px;
  font-weight: 200;
  letter-spacing: 0.04em;
  padding: 10px 0 10px;
  outline: none;
  -moz-appearance: textfield;
  appearance: textfield;
}
#age-input::-webkit-outer-spin-button,
#age-input::-webkit-inner-spin-button { -webkit-appearance: none; }
#age-input::placeholder { color: #303058; }
#age-input:focus { border-bottom-color: #5050a0; }

#begin-btn {
  margin-top: 36px;
  align-self: stretch;
  background: transparent;
  border: 1px solid #2a2a50;
  color: #8888c0;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 16px;
  border-radius: 2px;
  cursor: pointer;
  transition: border-color 0.3s, color 0.3s;
}
#begin-btn:hover { border-color: #5050a0; color: #b0b0e0; }
#begin-btn:disabled { opacity: 0.3; pointer-events: none; }

/* ── Main ─────────────────────────────────────────────────────────────── */

#screen-main {
  justify-content: flex-start;
  padding-top: max(72px, 14vh);
  gap: 0;
}

/* Ring */
.ring-outer {
  position: relative;
  width: 220px;
  height: 220px;
  margin-bottom: 36px;
  flex-shrink: 0;
}

.ring-svg {
  position: absolute;
  inset: -8px;
  width: calc(100% + 16px);
  height: calc(100% + 16px);
  pointer-events: none;
  transform: rotate(-90deg);
  overflow: visible;
}

.ring-track {
  fill: none;
  stroke: #0e0e1c;
  stroke-width: 2;
}

.ring-arc {
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
}

.ring-circle {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: #0e0e1c;
  touch-action: none;
  cursor: pointer;
  transition: box-shadow 0.6s ease;
}

.ring-circle.idle {
  animation: idle-pulse 4s ease-in-out infinite;
}

@keyframes idle-pulse {
  0%, 100% { box-shadow: 0 0 0px 0px rgba(90, 80, 140, 0); }
  50%       { box-shadow: 0 0 24px 4px rgba(90, 80, 140, 0.1); }
}

/* Instruction */
.instruction {
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #7070a8;
  text-align: center;
  transition: opacity 0.4s ease;
  flex-shrink: 0;
  height: 16px;
}

/* Reading */
.reading {
  margin-top: 44px;
  text-align: center;
  max-width: 300px;
  width: 100%;
  pointer-events: none;
}
.reading.visible { pointer-events: auto; }

.reading-lines {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.reading-line {
  font-size: 14px;
  font-weight: 300;
  line-height: 2;
  color: #c8c8e8;
  letter-spacing: 0.01em;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.reading-line.show {
  opacity: 1;
  transform: translateY(0);
}

/* Fifth line — traditional reading — styled distinctly */
.reading-line.tradition {
  font-size: 11px;
  letter-spacing: 0.08em;
  color: #9090c0;
  margin-top: 12px;
  font-style: italic;
}

.reset-btn {
  display: block;
  margin: 32px auto 0;
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #6868a0;
  cursor: pointer;
  border: none;
  background: none;
  padding: 8px;
  opacity: 0;
  transition: opacity 0.4s ease 1.8s, color 0.2s;
}
.reading.visible .reset-btn { opacity: 1; }
.reset-btn:hover { color: #a0a0d0; }

/* ── Feedback ─────────────────────────────────────────────────────────── */

.feedback {
  margin-top: 32px;
  text-align: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.feedback.show {
  opacity: 1;
  pointer-events: auto;
}
.feedback-q {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #6060a0;
  margin-bottom: 14px;
}
.feedback-opts {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.fopt {
  background: none;
  border: none;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #6868a0;
  cursor: pointer;
  padding: 6px 4px;
  transition: color 0.2s;
}
.fopt:hover { color: #a0a0d0; }
.fdot { color: #2a2a50; font-size: 9px; }
.feedback-noted {
  display: none;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #6060a0;
}
.feedback.done .feedback-opts { display: none; }
.feedback.done .feedback-noted { display: block; }
</style>
</head>
<body>

<!-- Welcome -->
<div class="screen" id="screen-welcome">
  <h1>Mood Ring</h1>
  <div class="welcome-body">
    <p class="welcome-desc">A color derived from where you are<br>in the cycles that move through everything.</p>
    <span class="field-label">Your age</span>
    <input type="number" id="age-input" min="1" max="110" inputmode="numeric" placeholder="—">
    <button id="begin-btn">Begin</button>
  </div>
</div>

<!-- Main -->
<div class="screen hidden" id="screen-main">

  <div class="ring-outer" id="ring-outer">
    <svg class="ring-svg" id="ring-svg" viewBox="0 0 236 236">
      <circle class="ring-track" cx="118" cy="118" r="114"/>
      <circle class="ring-arc"   cx="118" cy="118" r="114"
        id="ring-arc"
        stroke-dasharray="716.3"
        stroke-dashoffset="716.3"
        stroke="rgba(255,255,255,0.4)"/>
    </svg>
    <div class="ring-circle idle" id="ring-circle"></div>
  </div>

  <div class="instruction" id="instruction">hold</div>

  <div class="reading" id="reading">
    <div class="reading-lines" id="reading-lines"></div>
    <div class="feedback" id="feedback">
      <p class="feedback-q">did this feel like yours?</p>
      <div class="feedback-opts" id="feedback-opts">
        <button class="fopt" data-v="yes">yes</button>
        <span class="fdot">·</span>
        <button class="fopt" data-v="somewhat">somewhat</button>
        <span class="fdot">·</span>
        <button class="fopt" data-v="no">no</button>
      </div>
      <p class="feedback-noted">noted</p>
    </div>
    <button class="reset-btn" id="reset-btn">read again</button>
  </div>

</div>

<script>
// ── Color utilities ───────────────────────────────────────────────────

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(255 * f(0)), Math.round(255 * f(8)), Math.round(255 * f(4))];
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const l = (max + min) / 2;
  let h = 0, s = 0;
  if (max !== min) {
    const d = max - min;
    s = d / (1 - Math.abs(2 * l - 1));
    if (max === r)      h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
    else if (max === g) h = ((b - r) / d + 2) / 6;
    else                h = ((r - g) / d + 4) / 6;
  }
  return { h: h * 360, s: s * 100, l: l * 100 };
}

function lerpHSL(a, b, t) {
  let dh = b.h - a.h;
  if (dh > 180) dh -= 360;
  if (dh < -180) dh += 360;
  return { h: (a.h + dh * t + 360) % 360, s: a.s + (b.s - a.s) * t, l: a.l + (b.l - a.l) * t };
}

function multiStop(stops, t) {
  const n = stops.length - 1;
  const pos = Math.min(t * n, n - 0.00001);
  const i = Math.floor(pos);
  return lerpHSL(stops[i], stops[i + 1], pos - i);
}

function blendToRgb(colors) {
  // Blend in HSL space: circular mean for hue, arithmetic mean for S and L.
  // RGB averaging collapses complementary hues toward gray — HSL preserves vividness.
  let sinSum = 0, cosSum = 0, sSum = 0, lSum = 0;
  for (const c of colors) {
    const rad = c.h * Math.PI / 180;
    sinSum += Math.sin(rad);
    cosSum += Math.cos(rad);
    sSum += c.s;
    lSum += c.l;
  }
  const n = colors.length;
  const h = (Math.atan2(sinSum / n, cosSum / n) * 180 / Math.PI + 360) % 360;
  const [r, g, b] = hslToRgb(h, sSum / n, lSum / n);
  return { r, g, b };
}

function lerpRgb(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t),
  };
}

function rgbStr(c) { return `rgb(${c.r},${c.g},${c.b})`; }

function easeInOut(t) {
  return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
}

// ── Cycle math ────────────────────────────────────────────────────────

const PALETTE = [
  { h: 218, s: 65, l: 80 },  // Q1 — Icy Blue      (Acetylcholine)
  { h: 135, s: 65, l: 42 },  // Q2 — Green         (Serotonin)
  { h: 50,  s: 90, l: 54 },  // Q3 — Warm Yellow   (Dopamine)
  { h: 290, s: 75, l: 28 },  // Q4 — Deep Purple   (Norepinephrine)
];

function cycleColor(t, loop) {
  const stops = loop ? [...PALETTE, PALETTE[0]] : PALETTE;
  return multiStop(stops, t);
}

function getLifeT(age) {
  let ex = age < 20 ? 82 : age < 40 ? 84 : age < 55 ? 86 : age < 70 ? 89 : Math.max(age + 10, 92);
  return Math.min(age / ex, 1);
}

function getMoonT(date) {
  const knownNew = new Date('2024-01-11T11:57:00Z');
  const lunation = 29.530588861;
  const elapsed = (date - knownNew) / 86400000;
  return (((elapsed % lunation) + lunation) % lunation) / lunation;
}

function getSeasonT(date) {
  // Q1=Spring equinox · Q2=Summer · Q3=Autumn · Q4=Winter
  const doy = Math.floor((date - new Date(date.getFullYear(), 0, 0)) / 86400000);
  return ((doy - 80 + 365) % 365) / 365;
}

function getCircadianT(date) {
  // Q1=6am · Q2=noon · Q3=6pm · Q4=midnight
  const h = date.getHours() + date.getMinutes() / 60;
  return ((h - 6 + 24) % 24) / 24;
}

function computeColor(age) {
  const now = new Date();
  return blendToRgb([
    cycleColor(getLifeT(age),      false),
    cycleColor(getMoonT(now),      true),
    cycleColor(getSeasonT(now),    true),
    cycleColor(getCircadianT(now), true),
  ]);
}

// ── Traditional mood ring reading ─────────────────────────────────────

function traditionalReading(rgb) {
  const { h, s, l } = rgbToHsl(rgb.r, rgb.g, rgb.b);

  if (l < 16)          return "The ring reads dark — stillness, or the weight of strain.";
  if (s < 18)          return "The ring reads pale — between states, open, uncertain.";
  if (h < 20 || h >= 320) return "The ring reads red — a turning point, charged, unresolved.";
  if (h < 55 && l < 38)  return "The ring reads brown — strained, unsettled, something held too tight.";
  if (h < 60)          return "The ring reads amber — creative, alive, a little scattered.";
  if (h < 110)         return "The ring reads gold — active, seeking, restless.";
  if (h < 160)         return "The ring reads green — balanced, no strain, at rest.";
  if (h < 200)         return "The ring reads teal — focused, content, peaceful.";
  if (h < 230)         return "The ring reads blue — happy, open, emotions flowing.";
  if (h < 265)         return "The ring reads deep blue — serene, romantic, bliss.";
  return                      "The ring reads violet — passionate, purposeful, clear.";
}

// ── Poetry ────────────────────────────────────────────────────────────

const PHRASES = {
  moon: [
    ["The moon has turned its face away.", "A new cycle opens in the dark."],
    ["Light returns to one side of the world.", "The moon is carving its edge."],
    ["The moon holds nothing back tonight.", "Everything is illuminated."],
    ["Something is passing.", "The light retreats without apology."],
  ],
  season: [
    ["What was frozen is remembering how to move.", "The thaw has begun."],
    ["The long hours hold their light.", "Everything that was seeded is now working."],
    ["The world is giving itself away.", "The harvest has no interest in hesitation."],
    ["The earth holds still beneath the cold.", "This is the stillness before the turn."],
  ],
  life: [
    ["You are still in the becoming.", "The roots are going deeper than you know."],
    ["You are building the self that will carry you.", "The work you do now is the foundation."],
    ["You are at the peak of your expression.", "What you have made is real."],
    ["You carry the weight of what you know.", "The knowing has become its own kind of grace."],
  ],
  circadian: [
    ["Let this moment plant something.", "Begin with the body. The mind will follow."],
    ["Make what you came here to make.", "The light is at its sharpest. Use it."],
    ["Give it away. This is what it was for.", "The evening belongs to expression."],
    ["Let it rest. Let it become.", "The night is doing its own work."],
  ],
};

function generateReading(age, color) {
  const now  = new Date();
  const q    = t => Math.min(Math.floor(t * 4), 3);
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  return {
    lines: [
      pick(PHRASES.moon[q(getMoonT(now))]),
      pick(PHRASES.season[q(getSeasonT(now))]),
      pick(PHRASES.life[q(getLifeT(age))]),
      pick(PHRASES.circadian[q(getCircadianT(now))]),
    ],
    tradition: traditionalReading(color),
  };
}

// ── State ─────────────────────────────────────────────────────────────

let userAge      = null;
let targetColor  = null;
let isHolding    = false;
let isComplete   = false;
let holdStart    = null;
let rafId        = null;
let heldProgress = 0;

const HOLD_MS    = 3200;
const CIRCUMF    = 2 * Math.PI * 114; // ≈ 716.3
const COLOR_BASE = { r: 14, g: 14, b: 28 };

// ── Feedback endpoint ──────────────────────────────────────────────────
const GFORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSfkrirw-Ytn7o1cJgL19coLMHm9-pOmjFijJaMjZ30ZWfRPcQ/formResponse';
const GFORM_ENTRY  = 'entry.922165712';

// ── DOM ───────────────────────────────────────────────────────────────

const screenWelcome = document.getElementById('screen-welcome');
const screenMain    = document.getElementById('screen-main');
const ageInput      = document.getElementById('age-input');
const beginBtn      = document.getElementById('begin-btn');
const ringCircle    = document.getElementById('ring-circle');
const ringArc       = document.getElementById('ring-arc');
const instructEl    = document.getElementById('instruction');
const readingEl     = document.getElementById('reading');
const readingLines  = document.getElementById('reading-lines');
const resetBtn      = document.getElementById('reset-btn');
const feedbackEl    = document.getElementById('feedback');

// ── Welcome ───────────────────────────────────────────────────────────

beginBtn.addEventListener('click', () => {
  const age = parseInt(ageInput.value);
  if (!age || age < 1 || age > 110) { ageInput.focus(); return; }
  userAge = age;
  targetColor = computeColor(age);
  beginBtn.disabled = true;

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      () => transitionToMain(),
      () => transitionToMain(),
      { timeout: 4000 }
    );
  } else {
    transitionToMain();
  }
});

ageInput.addEventListener('keydown', e => { if (e.key === 'Enter') beginBtn.click(); });

function transitionToMain() {
  screenWelcome.classList.add('hidden');
  setTimeout(() => screenMain.classList.remove('hidden'), 300);
}

// ── Hold ──────────────────────────────────────────────────────────────

function startHold(e) {
  if (isComplete) return;
  e.preventDefault();
  ringCircle.setPointerCapture(e.pointerId);
  isHolding = true;
  holdStart = Date.now();
  ringCircle.classList.remove('idle');
  instructEl.style.opacity = '0';
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(tick);
}

function tick() {
  if (!isHolding) return;
  const p = Math.min((Date.now() - holdStart) / HOLD_MS, 1);
  heldProgress = p;
  paint(easeInOut(p));
  if (p >= 1) { complete(); return; }
  rafId = requestAnimationFrame(tick);
}

function endHold(e) {
  if (!isHolding || isComplete) return;
  isHolding = false;
  cancelAnimationFrame(rafId);
  animReset();
}

function paint(e) {
  const col = lerpRgb(COLOR_BASE, targetColor, e);
  ringCircle.style.background = rgbStr(col);
  ringArc.setAttribute('stroke-dashoffset', CIRCUMF * (1 - e));
  ringArc.setAttribute('stroke', rgbStr(col));
}

function complete() {
  isHolding  = false;
  isComplete = true;
  paint(1);
  const c = targetColor;
  ringCircle.style.boxShadow = `0 0 56px 12px rgba(${c.r},${c.g},${c.b},0.22)`;
  showReading();
}

function animReset() {
  const startP  = heldProgress;
  const startT  = Date.now();
  const resetMs = Math.max(startP * 600, 200);

  function step() {
    const t = Math.min((Date.now() - startT) / resetMs, 1);
    paint(easeInOut(startP * (1 - t * t)));
    if (t < 1) { requestAnimationFrame(step); return; }
    paint(0);
    heldProgress = 0;
    ringCircle.classList.add('idle');
    instructEl.style.opacity = '1';
  }
  requestAnimationFrame(step);
}

// ── Reading ───────────────────────────────────────────────────────────

function showReading() {
  const { lines, tradition } = generateReading(userAge, targetColor);
  const all = [...lines, tradition];

  readingLines.innerHTML = all
    .map((l, i) => `<div class="reading-line${i === all.length - 1 ? ' tradition' : ''}">${l}</div>`)
    .join('');

  readingEl.classList.add('visible');

  readingLines.querySelectorAll('.reading-line').forEach((el, i) => {
    setTimeout(() => el.classList.add('show'), 300 + i * 320);
  });

  // Show feedback prompt after all lines have settled
  const lastLineAt = 300 + (all.length - 1) * 320;
  setTimeout(() => feedbackEl.classList.add('show'), lastLineAt + 900);
}

function submitFeedback(value) {
  feedbackEl.classList.add('done');
  const label = (traditionalReading(targetColor).match(/reads (\w+)/) || [])[1] || 'unknown';
  const payload = `${value} | ${label} | ${rgbStr(targetColor)}`;
  const body = new FormData();
  body.append(GFORM_ENTRY, payload);
  fetch(GFORM_ACTION, { method: 'POST', mode: 'no-cors', body }).catch(() => {});
}

feedbackEl.addEventListener('click', e => {
  const btn = e.target.closest('.fopt');
  if (!btn || feedbackEl.classList.contains('done')) return;
  submitFeedback(btn.dataset.v);
});

resetBtn.addEventListener('click', () => {
  isComplete   = false;
  heldProgress = 0;

  readingEl.classList.remove('visible');
  readingLines.querySelectorAll('.reading-line').forEach(el => el.classList.remove('show'));
  setTimeout(() => { readingLines.innerHTML = ''; }, 400);

  feedbackEl.classList.remove('show', 'done');

  ringCircle.style.boxShadow = '';
  paint(0);
  ringCircle.classList.add('idle');
  instructEl.style.opacity = '1';

  targetColor = computeColor(userAge);
});

// ── Events ────────────────────────────────────────────────────────────

ringCircle.addEventListener('pointerdown',   startHold, { passive: false });
ringCircle.addEventListener('pointerup',     endHold);
ringCircle.addEventListener('pointercancel', endHold);
</script>
</body>
</html>
